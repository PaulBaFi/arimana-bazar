<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión | Arimana Bazar Ica</title>

    <link rel="stylesheet" href="./css/iniciar-sesion.css" />

    <link rel="shortcut icon" href="./img/SimpleLogo.png" type="image/x-icon" />
    <script
      src="https://kit.fontawesome.com/aeeba1d16d.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="mensaje" class="mensaje-error"></div>

    <section class="login-container">
      <div class="login-background"></div>
      <img class="login-logo" src="./img/logo-square.png" alt="Logo" />
      <h1 class="titulo">¡Bienvenid@!</h1>
      <p class="mensaje">
        Por favor, ingrese sus credenciales para entrar al sistema web de
        Arimana Bazar Ica
      </p>

      <form class="login-form" id="loginForm">
        <label for="correo">
          <span>Correo Electrónico</span>
          <input
            type="email"
            id="correo"
            name="correo"
            required
            maxlength="50"
          />
          <i class="fa-solid fa-user"></i>
        </label>
        <label for="clave">
          <span>Contraseña</span>
          <input
            type="password"
            id="clave"
            name="clave"
            required
            maxlength="50"
          />
          <i class="fa-solid fa-eye"></i>
        </label>
        <button type="submit" class="login-btn">Ingresar</button>
      </form>

      <p class="mensaje right">
        Si aún no se encuentra registrado,<br />
        ingrese aquí
        <a class="registrarse-url" href="./registrarse.html">Registrarse</a>
      </p>
    </section>

    <script>
      const mensaje = document.getElementById("mensaje");
      const form = document.getElementById("loginForm");

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        login();
      });

      function mostrarMensaje(texto, tiempo = 10000) {
        mensaje.innerHTML =
          "<i class='fa-solid fa-circle-xmark'></i> &nbsp;" + texto;
        mensaje.style.display = "block";

        // Elimina clase previa y reinicia animación si quieres agregar efectos
        mensaje.classList.remove("visible");
        void mensaje.offsetWidth; // Forzar reflow
        mensaje.classList.add("visible");

        setTimeout(() => {
          mensaje.innerHTML = "";
          mensaje.style.display = "none";
        }, tiempo);
      }

      function login() {
        const correo = document.getElementById("correo").value.trim();
        const clave = document.getElementById("clave").value.trim();

        if (correo === "" || clave === "") {
          mostrarMensaje("Por favor, complete todos los campos.");
          return;
        }

        const validEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!validEmail.test(correo)) {
          mostrarMensaje("Por favor, ingrese un correo electrónico válido.");
          return;
        }

        if (correo === "admin@gmail.com" && clave === "123") {
          window.location.href = "./dashboard.html";
        } else {
          mostrarMensaje("Credenciales incorrectas. Intente nuevamente.");
        }
      }
    </script>
  </body>
</html>
