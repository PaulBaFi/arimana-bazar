<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrarse | Arimana Bazar</title>

    <link rel="stylesheet" href="./css/registrarse.css" />
    <link rel="shortcut icon" href="./img/SimpleLogo.png" type="image/x-icon" />
    <script
      src="https://kit.fontawesome.com/aeeba1d16d.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="registrarse-container">
      <h1 class="registrarse-title">Registrarse</h1>
      <p class="mensaje">
        Si ya se encuentra registrado, ingrese aquí
        <a href="./index.html">Iniciar sesión</a>
      </p>

      <form class="form-registrarse" action="">
        <div class="columns-groups">
          <div class="form-group1">
            <div class="form-group">
              <label for="nombres">Nombres:</label>
              <input type="text" id="nombres" required />
            </div>
            <div class="form-group">
              <label for="ape-paterno">Apellido paterno:</label>
              <input type="text" id="ape-paterno" required />
            </div>
            <div class="form-group">
              <label for="ape-materno">Apellido materno:</label>
              <input type="text" id="ape-materno" required />
            </div>
            <div class="form-group">
              <label for="dni">DNI:</label>
              <input type="text" id="dni" required />
            </div>
            <div class="form-group">
              <label for="correo">Correo:</label>
              <input type="email" id="correo" required />
            </div>
            <div class="form-group">
              <label for="calve">Clave:</label>
              <input type="password" id="clave" required />
            </div>
            <div class="form-group">
              <label for="telefono">Teléfono:</label>
              <input type="text" id="telefono" required />
            </div>
            <div class="form-group">
              <label for="direccion">Dirección:</label>
              <input type="text" id="direccion" required />
            </div>
          </div>
          <div class="form-group2">
            <div class="form-group">
              <label for="departamento">Departamento:</label>
              <select id="departamento" required>
                <option value="">— Seleccionar —</option>
              </select>
            </div>
            <div class="form-group">
              <label for="provincia">Provincia:</label>
              <select id="provincia" disabled required>
                <option value="">— Seleccionar —</option>
              </select>
            </div>
            <div class="form-group">
              <label for="provincia">Distrito:</label>
              <select id="distrito" disabled required>
                <option value="">— Seleccionar —</option>
              </select>
            </div>
            <div class="form-group">
              <label for="nacimiento">Nacimiento:</label>
              <input type="date" id="nacimiento" required />
            </div>
            <div class="form-group">
              <label for="cargo">Cargo:</label>
              <select id="cargo">
                <option value="">— Seleccionar —</option>
                <option value="">Gerente</option>
                <option value="">Administrador</option>
                <option value="">Asesor de ventas</option>
                <option value="">Encargado de almacen</option>
                <option value="">Encargado de marketing</option>
              </select>
            </div>
            <div class="form-group">
              <label for="contrato">Contrato:</label>
              <select id="contrato">
                <option value="">— Seleccionar —</option>
                <option value="">Tiempo completo</option>
                <option value="">Medio tiempo</option>
              </select>
            </div>
            <div class="form-group">
              <label for="turno">Turno:</label>
              <select id="turno">
                <option value="">— Seleccionar —</option>
                <option value="mañana">Mañana</option>
                <option value="tarde">Tarde</option>
                <option value="noche">Noche</option>
              </select>
            </div>
            <div class="form-group">
              <label for="tipo-usuario">Tipo de usuario:</label>
              <select id="tipo-usuario">
                <option value="">— Seleccionar —</option>
                <option value="admin">Administrador</option>
                <option value="empleado">Usuario estándar</option>
                <option value="empleado">Usuario sin acceso</option>
              </select>
            </div>
          </div>
        </div>
        <div class="form-group-btns">
          <button type="button" id="btn-limpiar">Limpiar</button>
          <button type="submit" id="btn-guardar-usuario">Guardar</button>
        </div>
      </form>
    </div>
  </body>
</html>
